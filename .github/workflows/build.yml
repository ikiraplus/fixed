name: Build CinemanaFix Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: /Users/runner/theos

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid dpkg xz

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download SDK
        run: |
          git clone https://github.com/theos/sdks.git /tmp/sdks
          cp -r /tmp/sdks/iPhoneOS16.5.sdk $THEOS/sdks/

      - name: Build
        run: |
          cd CinemanaFix
          make clean all 2>&1

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaFix-deb
          path: CinemanaFix/packages/*.deb
          if-no-files-found: warn

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaFix-dylib
          path: CinemanaFix/.theos/obj/debug/*.dylib
          if-no-files-found: warn
