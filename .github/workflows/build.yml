name: Build CinemanaFix Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo apt-get install -y git curl make
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          curl -L -o iPhoneOS16.5.sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/2023-09-29/iPhoneOS16.5.sdk.tar.xz"
          tar -xf iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks/

      - name: Build tweak
        run: |
          cd CinemanaFix
          make package FINALPACKAGE=1

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaFix-deb
          path: CinemanaFix/packages/*.deb

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaFix-dylib
          path: CinemanaFix/.theos/obj/debug/*.dylib
